name: csv_generator
description: Editor CSV con OCR
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5
  google_mlkit_text_recognition: ^0.13.0
  file_picker: ^8.0.0
  csv: ^6.0.0
  path_provider: ^2.1.2
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  permission_handler: ^11.3.1
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon/gato.png" # 👈 AQUÍ PONES TU ARCHIVO
  min_sdk_android: 21
