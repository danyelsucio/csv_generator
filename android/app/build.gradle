plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.csv_generator"
    compileSdkVersion 35
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    defaultConfig {
        applicationId "com.example.csv_generator"
        minSdkVersion 21
        targetSdkVersion 35
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}

dependencies {}

// FORZAR VERSIONES NUEVAS DE ML KIT CON NAMESPACE
configurations.all {
    resolutionStrategy {
        force 'com.google.mlkit:barcode-scanning:17.2.0'
        force 'com.google.mlkit:text-recognition:16.0.1'
        force 'com.google.mlkit:face-detection:16.1.7'
        force 'com.google.android.gms:play-services-mlkit-text-recognition:19.0.1'
        force 'com.google.android.gms:play-services-mlkit-face-detection:17.1.0'
    }
}
