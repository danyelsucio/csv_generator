name: Compilar csv_generator
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          
      - run: flutter create .
      
      - name: Parche SDK 35
        run: sed -i 's/compileSdkVersion.*/compileSdkVersion 35/' android/app/build.gradle
        
      - name: Parche Kotlin 1.9
        run: sed -i 's/ext.kotlin_version.*/ext.kotlin_version = "1.9.22"/' android/build.gradle
        
      - run: flutter pub get
      - run: flutter build apk --release
      
      - uses: actions/upload-artifact@v4
        with:
          name: contador-apk
          path: build/app/outputs/flutter-apk/app-release.apk
